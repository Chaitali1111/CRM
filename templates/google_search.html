<!DOCTYPE html>
<html>
<head>
    <title>Google Maps Search</title>

    <style>

        body{
            font-family:Segoe UI;
            background:#f4f6f9;
            margin:0;
            padding:40px;
        }

        .container{
            width:600px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        h2{
            margin-bottom:25px;
            color:#2563eb;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Google Maps Search</h2>

<form method="post" action="/google-search">

<input
type="text"
name="keyword"
placeholder="Example : Transport Companies Mumbai"
required>

<button>

Search Google Maps

</button>

</form>

{% if results %}

<br><br>

<h3>Google Search Results</h3>

<table border="1" cellpadding="10" cellspacing="0" width="100%">

<tr>
    <th>Company</th>
    <th>Phone</th>
    <th>Address</th>
    <th>Website</th>
    <th>Action</th>
</tr>

{% for item in results %}

<tr>

    <td>{{ item.company_name }}</td>

    <td>{{ item.phone }}</td>

    <td>{{ item.address }}</td>

    <td>
        <a href="{{ item.website }}" target="_blank">
            Visit
        </a>
    </td>

    <td>
        <button type="button">
            Save
        </button>
    </td>

</tr>

{% endfor %}

</table>

{% endif %}
</div>

</body>

</html>
