<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input,select{
            width:100%;
            padding:12px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>User Registration</h2>

    <form action="/register" method="post">

    <input
        type="text"
        name="name"
        placeholder="Full Name"
        required
    >

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <select name="role">

        <option value="User">User</option>
        <option value="Admin">Admin</option>

    </select>

    <button type="submit">
        Register
    </button>

</form>

</div>

</body>
</html>
