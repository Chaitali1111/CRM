<!DOCTYPE html>
<html>
<head>
    <title>Campaign Management</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            background:#f4f6f9;
        }

        .sidebar{
            position:fixed;
            left:0;
            top:0;
            width:230px;
            height:100vh;
            background:#111827;
            color:white;
            padding:20px;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:35px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px 15px;
            margin-bottom:10px;
            border-radius:10px;
        }

        .sidebar a:hover{
            background:#2563eb;
        }

        .active{
            background:#2563eb;
        }

        .main{
            margin-left:250px;
            padding:30px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .title{
            margin-bottom:25px;
        }

        .title h2{
            color:#2563eb;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input[type="text"],
        select,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
        }

        textarea{
            height:150px;
            resize:none;
        }

        .btn{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h2>🚀 CRM </h2>

    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/add-lead">Add Lead</a>
    <a href="/leads">View Leads</a>
    <a href="/google-search">Google Search</a>
    <a href="/groups">Groups</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/logout">Logout</a>
</div>


<div class="main">

    <div class="card">

        <div class="title">
            <h2>📢 Campaign Management</h2>
            <p>Create campaign and attach PDF with message content</p>
        </div>

        <form
            
                    action="/save-campaign"
                    method="post"
                    enctype="multipart/form-data"
        >

            <div class="form-group">
                <label>Campaign Name</label>
                <input
                     type="text"
                     name="campaign_name"
                     placeholder="Enter Campaign Name"
>
            </div>

            <div class="form-group">
                <label>Select Group</label>
                <select name="group_name">

                            <option value="">
                                Select Group
                            </option>

                            {% for group in groups %}

                            <option value="{{ group[0] }}">
                                {{ group[0] }}
                            </option>

                            {% endfor %}

                </select>
            </div>

            <div class="form-group">
                <label>Upload PDF</label>
                <input
                    type="file"
                   name="pdf_file"
                   accept=".pdf"
                >
            </div>

            <div class="form-group">
                <label>Message Content</label>
                <textarea
                     name="message_content"
                       placeholder="Enter message content here..."
                ></textarea>
            </div>

            <div style="margin-top:20px; display:flex; gap:15px;">

                <button type="submit" class="btn">
                    Save Campaign
                </button>

               <a href="/campaign-list"
                        class="btn"
                        style="
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            text-decoration:none;
                            color:white;
                        ">
                        📋 View Campaigns
                </a>

            </div>

            </form>

        <div style="margin-top:20px;">

            

        </div>

    </div>

</div>

</body>
</html>
