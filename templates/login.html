<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Pro Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #2563eb,
        #1e293b
    );
}

.container{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#1e293b;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:30px;
}

.error-box{
    background:#fee2e2;
    color:#dc2626;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
    border:1px solid #fca5a5;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;

    border:1px solid #d1d5db;
    border-radius:10px;

    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:10px;

    background:#2563eb;
    color:white;

    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#6b7280;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        🚀
    </div>

    <h1>CRM PRO</h1>

    <p class="subtitle">
        Lead Management System
    </p>

    <form action="/login" method="post">

        {% if error %}
        <div class="error-box">
            ❌ {{ error }}
        </div>
        {% endif %}

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        Manage Leads • Track Clients • Grow Business
    </div>

</div>

</body>
</html>
