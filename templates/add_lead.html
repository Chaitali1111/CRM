<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Add Lead</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
        }

        /* Sidebar */

        .sidebar{
            position:fixed;
            left:0;
            top:0;
            width:220px;
            height:100vh;
            background:#1f2937;
            padding:20px;
        }

        .sidebar h2{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px;
            margin-bottom:10px;
            border-radius:5px;
        }

        .sidebar a:hover{
            background:#374151;
        }

        .active{
            background:#2563eb;
        }

        /* Main Content */

        .main{
            margin-left:240px;
            padding:30px;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
            max-width:850px;
            margin:auto;
}

        h2{
            margin-bottom:25px;
        }

       input{
             width:100%;
             padding:14px;
           margin-bottom:18px;
           border:1px solid #d1d5db;
           border-radius:8px;
            font-size:15px;
            transition:0.3s;
            }

        input:focus{
                  outline:none;
                 border-color:#2563eb;
                box-shadow:0 0 0 3px rgba(37,99,235,0.15);
           }           

        button{
              width:100%;
                padding:14px;
                background:#2563eb;
                color:white;
                border:none;
                border-radius:8px;
                cursor:pointer;
                font-size:16px;
                font-weight:bold;
            }
       

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>
<body>

    <!-- Sidebar -->

    <div class="sidebar">

    <h2>🚀 CRM </h2>

            <a href="/dashboard">Dashboard</a>
            <a href="/add-lead" class="active">Add Lead</a>
            <a href="/leads">View Leads</a>
            <a href="/groups">Groups</a>
            <a href="/campaigns">Campaigns</a>
            <a href="/logout">Logout</a>

</div>

    <!-- Main -->

    <div class="main">

        <div class="card">

            <h2>➕ Add New Business Lead</h2>

            <p style="color:#666;margin-bottom:20px;">
               Create and manage business leads for your CRM database.
             </p>

            <form action="/add-lead" method="post">

                <input
                    type="text"
                    name="company_name"
                    placeholder="Company Name"
                    required
                >

                <input
                    type="text"
                    name="mobile_number"
                    placeholder="Mobile Number"
                    required
                >

                <input
                    type="text"
                    name="address"
                    placeholder="Address"
                >

                <input
                    type="text"
                    name="category"
                    placeholder="Category"
                >

                <input
                    type="text"
                    name="group_name"
                    placeholder="Group Name"
                >

                <input
                    type="text"
                    name="city"
                    placeholder="City"
                >

                <button type="submit">
                    Save Lead
                </button>

            </form>

        </div>

    </div>

</body>
</html>
